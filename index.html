<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>jair@campelo:~$</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:        #0e1012;
      --bg-term:   #131618;
      --border:    #2a2e32;
      --gold:      #eb9b13;
      --gold-dim:  #9b6610;
      --blue:      #135290;
      --green:     #3dd68c;
      --red:       #ff5f57;
      --yellow:    #febc2e;
      --text:      #d4d8dc;
      --muted:     #555e66;
      --prompt:    #eb9b13;
      --font:      'JetBrains Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 16px 48px;
      min-height: 100vh;
    }

    /* ── Scanlines overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0,0,0,0.04) 2px,
        rgba(0,0,0,0.04) 4px
      );
    }

    /* ── Terminal window ── */
    .terminal {
      position: relative; z-index: 1;
      width: 100%; max-width: 680px;
      background: var(--bg-term);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(235,155,19,0.15),
        0 24px 80px rgba(0,0,0,0.7),
        0 0 40px rgba(235,155,19,0.18),
        0 0 80px rgba(235,155,19,0.10),
        0 0 120px rgba(235,155,19,0.06);
    }

    /* ── Title bar ── */
    .titlebar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: #1a1d20;
      border-bottom: 1px solid var(--border);
      user-select: none;
    }
    .dots {
      display: flex; gap: 7px;
    }
    .dot {
      width: 12px; height: 12px; border-radius: 50%;
    }
    .dot-red    { background: var(--red); }
    .dot-yellow { background: var(--yellow); }
    .dot-green  { background: var(--green); }
    .titlebar-label {
      flex: 1; text-align: center;
      font-size: 0.72rem; color: var(--muted);
      letter-spacing: 0.06em;
    }
    .titlebar-spacer { width: 46px; }

    /* ── Body ── */
    .term-body {
      padding: 20px 20px 28px;
      min-height: 320px;
    }

    /* ── Lines ── */
    .line {
      display: block;
      opacity: 0;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .line.visible { opacity: 1; }

    .prompt-line { color: var(--prompt); }
    .prompt-line .sym { color: #00aaff; }
    .prompt-line .cmd { color: var(--text); }

    .output { color: var(--text); padding-left: 0; }
    .output.dim { color: var(--muted); }

    .gt { color: var(--gold); margin-right: 6px; }
    .key { color: var(--gold-dim); }

    .blank { height: 14px; display: block; opacity: 0; }
    .blank.visible { opacity: 1; }

    /* links section */
    .links-block {
      margin-top: 4px;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .links-block.visible { opacity: 1; }

    .link-row {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 4px 0;
      color: var(--muted);
      font-size: 0.85rem;
    }
    .link-row .num   { color: var(--gold); min-width: 28px; }
    .link-row .lname { color: var(--text); min-width: 100px; }
    .link-row .arr   { color: var(--muted); margin: 0 8px; }
    .link-row a {
      color: var(--blue);
      text-decoration: none;
      border-bottom: 1px solid rgba(19,82,144,0.3);
      transition: color 0.2s, border-color 0.2s;
    }
    .link-row a:hover {
      color: var(--gold);
      border-color: var(--gold-dim);
    }

    /* ── Cursor ── */
    .cursor {
      display: inline-block;
      width: 8px; height: 1.1em;
      background: var(--gold);
      vertical-align: text-bottom;
      animation: blink 1.1s step-start infinite;
      margin-left: 2px;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
    .cursor.hidden { display: none; }

    /* ── Footer ── */
    .term-footer {
      padding: 10px 20px 14px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green);
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }
    .status-text {
      font-size: 0.7rem; color: var(--muted); letter-spacing: 0.06em;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      body { padding: 12px 10px 40px; }
      .term-body { padding: 16px 14px 22px; }
      html, body { font-size: 13px; }
      .link-row .lname { min-width: 80px; }
    }
  </style>
</head>
<body>

<div class="terminal">
  <div class="titlebar">
    <div class="dots">
      <div class="dot dot-red"></div>
      <div class="dot dot-yellow"></div>
      <div class="dot dot-green"></div>
    </div>
    <div class="titlebar-label">jair@campelo — ~/home</div>
    <div class="titlebar-spacer"></div>
  </div>

  <div class="term-body" id="term-body">
    <!-- content injected by JS -->
  </div>

  <div class="term-footer">
    <div class="status-dot"></div>
    <div class="status-text">connected · bragança-pa · brasil</div>
  </div>
</div>

<script>
  const body = document.getElementById('term-body');

  // ── Sequence definition ──────────────────────────────────────
  const sequence = [
    { type: 'prompt', cmd: 'whoami' },
    { type: 'blank' },
    { type: 'output', text: 'jair-campelo' },
    { type: 'blank' },
    { type: 'prompt', cmd: 'cat about.txt' },
    { type: 'blank' },
    { type: 'gt', text: 'Olá, me chamo Jair Campelo, sou Analista de Dados e Business Intelligence, mas com um pé na Engenharia de Dados' },
    { type: 'gt', text: 'Atualmente resido em Bragança, no estado do Pará e gosto de pagode, gatos, praia e cozinhar' },
    { type: 'gt', text: 'Seja bem vindo(a)' },
    { type: 'blank' },
    { type: 'prompt', cmd: 'cat links.txt' },
    { type: 'blank' },
    { type: 'links' },
    { type: 'blank' },
    { type: 'prompt-idle' },
  ];

  // ── Typing speeds (ms) ───────────────────────────────────────
  const CHAR_DELAY   = 38;   // per character while typing cmd
  const LINE_PAUSE   = 320;  // after a command appears, before output
  const OUTPUT_PAUSE = 80;   // between output lines
  const BLANK_PAUSE  = 180;

  // ── Helpers ──────────────────────────────────────────────────
  function sleep(ms) {
    return new Promise(r => setTimeout(r, ms));
  }

  function makeBlank() {
    const el = document.createElement('span');
    el.className = 'blank';
    return el;
  }

  function makePromptLine(cmd) {
    const el = document.createElement('div');
    el.className = 'line prompt-line';
    el.innerHTML = `<span class="sym">$ </span><span class="cmd"></span>`;
    return el;
  }

  function makeOutputLine(text, isGt = false) {
    const el = document.createElement('div');
    el.className = 'line output';
    if (isGt) {
      el.innerHTML = `<span class="gt">›</span>${escHtml(text)}`;
    } else {
      el.textContent = text;
    }
    return el;
  }

  function makeLinksBlock() {
    const block = document.createElement('div');
    block.className = 'links-block';

    const links = [
      { num: '[1]', name: 'Portfolio', url: '/portfolio',                          label: 'jaircampelo.com.br/portfolio' },
      { num: '[2]', name: 'LinkedIn',  url: 'https://linkedin.com/in/jaircampelo', label: 'linkedin.com/in/jaircampelo' },
      { num: '[3]', name: 'GitHub',    url: 'https://github.com/jaircampelo',      label: 'github.com/jaircampelo' },
      { num: '[4]', name: 'E-mail',    url: 'mailto:jair@jaircampelo.com.br',      label: 'jair@jaircampelo.com.br' },
      { num: '[5]', name: 'WhatsApp',  url: 'https://wa.me/5591990612086',         label: '+55 91 99061-2086' },
    ];

    links.forEach(l => {
      const row = document.createElement('div');
      row.className = 'link-row';
      row.innerHTML = `
        <span class="num">${l.num}</span>
        <span class="lname">${l.name}</span>
        <span class="arr">→</span>
        <a href="${l.url}" ${l.url.startsWith('http') || l.url.startsWith('mailto') ? 'target="_blank" rel="noopener"' : ''}>${l.label}</a>
      `;
      block.appendChild(row);
    });

    return block;
  }

  function makeIdlePrompt() {
    const el = document.createElement('div');
    el.className = 'line prompt-line';
    el.innerHTML = `<span class="sym">$ </span><span class="cursor"></span>`;
    return el;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Type a command char by char ──────────────────────────────
  async function typeCmd(el, cmd) {
    const span = el.querySelector('.cmd');
    el.classList.add('visible');
    for (const ch of cmd) {
      span.textContent += ch;
      await sleep(CHAR_DELAY);
    }
  }

  // ── Main render loop ─────────────────────────────────────────
  async function render() {
    for (const step of sequence) {

      if (step.type === 'blank') {
        const el = makeBlank();
        body.appendChild(el);
        await sleep(BLANK_PAUSE);
        el.classList.add('visible');
        continue;
      }

      if (step.type === 'prompt') {
        const el = makePromptLine();
        body.appendChild(el);
        await sleep(200);
        await typeCmd(el, step.cmd);
        await sleep(LINE_PAUSE);
        continue;
      }

      if (step.type === 'output') {
        const el = makeOutputLine(step.text);
        body.appendChild(el);
        el.classList.add('visible');
        await sleep(OUTPUT_PAUSE);
        continue;
      }

      if (step.type === 'gt') {
        const el = makeOutputLine(step.text, true);
        body.appendChild(el);
        el.classList.add('visible');
        await sleep(OUTPUT_PAUSE + 60);
        continue;
      }

      if (step.type === 'links') {
        const block = makeLinksBlock();
        body.appendChild(block);
        await sleep(120);
        block.classList.add('visible');
        await sleep(OUTPUT_PAUSE * 3);
        continue;
      }

      if (step.type === 'prompt-idle') {
        const el = makeIdlePrompt();
        body.appendChild(el);
        el.classList.add('visible');
        continue;
      }
    }
  }

  // ── Start after short delay ──────────────────────────────────
  window.addEventListener('load', () => {
    setTimeout(render, 600);
  });
</script>
</body>
</html>
